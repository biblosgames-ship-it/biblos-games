<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero Digital Biblos</title>
    <style>
        body { background: #1B1A17; color: #D6D0C4; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        #tablero-container {
            position: relative;
            width: fit-content;
            margin: 20px auto;
            border: 4px solid #3A342C;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #tablero-img { max-width: 90vw; height: auto; display: block; }
        
        #jugador-ficha {
            position: absolute;
            width: 30px; height: 30px;
            background: #D97706;
            border-radius: 50%;
            border: 2px solid white;
            transition: all 0.5s ease;
            top: 0; left: 0;
            z-index: 10;
        }

        button { padding: 15px 30px; font-size: 18px; background: #D97706; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; color: black; }
    </style>
</head>
<body>

    <a href="/" style="position: absolute; top: 20px; left: 20px; color: #D97706; text-decoration: none;">← Volver</a>
    <h1>Tablero Digital</h1>
    
    <div id="tablero-container">
        <img src="/Tablero.jpg" id="tablero-img" alt="Tablero Biblos">
        <div id="jugador-ficha"></div>
    </div>

    <button onclick="moverFicha()">🎲 Tirar dado</button>
    <h2 id="resultado">🎲</h2>
    <h3 id="info">Posición: 0</h3>

<script>
    // --- 1. DATOS ---
    // Aquí irán tus coordenadas. Si ya tienes algunas, puedes dejarlas pegadas.
    const coordenadas = [
        {x: 50, y: 50}, // Casilla 0
        // ... (Aquí irás pegando el resultado de tus clics)
    ];

    let posicionActual = 0;
    
    // --- 2. LÓGICA DEL JUEGO ---
    function moverFicha() {
        const dado = Math.floor(Math.random() * 6) + 1;
        posicionActual = Math.min(posicionActual + dado, 75);
        
        const ficha = document.getElementById('jugador-ficha');
        const pos = coordenadas[posicionActual];
        
        if (!pos) {
            document.getElementById('info').innerText = "Falta mapear casilla: " + posicionActual;
            return;
        }
        
        // Mover la ficha con centrado automático
        ficha.style.left = pos.x + 'px';
        ficha.style.top = pos.y + 'px';
        ficha.style.transform = "translate(-50%, -50%)"; 
        
        document.getElementById('resultado').innerText = "🎲 " + dado;
        document.getElementById('info').innerText = "Estás en la casilla: " + posicionActual;
    }

    // --- 3. AYUDANTE DE MAPEO (SOLO PARA DESARROLLO) ---
    // Este contador es independiente del juego, así no se descontrola
    let contadorMapeo = 0; 

    document.getElementById('tablero-img').addEventListener('click', function(e) {
        const rect = e.target.getBoundingClientRect();
        const x = Math.round(e.clientX - rect.left);
        const y = Math.round(e.clientY - rect.top);
        
        // Imprime en consola para copiar masivamente
        console.log(`{x: ${x}, y: ${y}}, // Casilla ${contadorMapeo}`);
        
        // Alerta visual para confirmar
        alert("Casilla " + contadorMapeo + " mapeada. Revisa la consola.");
        
        contadorMapeo++; // Aumenta automáticamente para la siguiente vez que hagas clic
    });
</script>
</body>
</html>
