<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #1B1A17; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        /* La cuadrícula del tablero */
        #tablero {
            display: grid;
            grid-template-columns: repeat(10, 50px); /* 10 columnas de 50px */
            gap: 5px;
            margin: 20px;
        }

        /* Cada casilla */
        .casilla {
            width: 50px;
            height: 50px;
            background: #2A2621;
            border: 1px solid #3A342C;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #777;
        }

        /* Clase que se activa cuando el jugador está en la casilla */
        .jugador {
            background: #D97706 !important; /* Ámbar */
            color: black !important;
            font-weight: bold;
            box-shadow: 0 0 10px #D97706;
        }
    </style>
</head>
<body>

    <h1>Tablero Digital Biblos</h1>
    
    <div id="tablero"></div>

    <button onclick="moverJugador()">🎲 Tirar dado</button>
    <h2 id="info">Posición: 0</h2>

    <script>
    // 1. Aquí defines los datos de las 75 estaciones
    const estaciones = [
        { id: 0, desc: "Salida", tipo: "normal" },
        { id: 1, desc: "Creación: Día y Noche", tipo: "normal" },
        { id: 2, desc: "Creación: Cielo y Mar", tipo: "normal" },
        { id: 3, desc: "Creación: Plantas", tipo: "normal" },
        { id: 4, desc: "Creación: Sol y Estrellas", tipo: "pregunta" },
        { id: 5, desc: "Creación: Aves y Peces", tipo: "normal" },
        { id: 6, desc: "Creación: Animales y Hombre", tipo: "normal" },
        { id: 7, desc: "Dios descansó", tipo: "skip" },
        { id: 8, desc: "En el Edén", tipo: "pregunta" },
        { id: 9, desc: "Has pecado", tipo: "retrocede" },
        { id: 10, desc: "Salida del Huerto", tipo: "avanza" },
        { id: 11, desc: "Caín y Abel", tipo: "normal" },
        { id: 12, desc: "El Gran Diluvio", tipo: "pregunta" },
        { id: 13, desc: "Sobreviviste al Diluvio", tipo: "normal" },
        { id: 14, desc: "Torre de Babel", tipo: "pregunta" },
        { id: 15, desc: "Dios llama a Abraham", tipo: "normal" },
        { id: 16, desc: "El hijo de la promesa", tipo: "normal" },
        { id: 17, desc: "Jacob y Esaú", tipo: "pregunta" },
        // ... (Aquí irían tus estaciones 18 al 74) ...
        { id: 75, desc: "META: Cielo nuevo y tierra nueva", tipo: "meta" }
    ];

    // 2. Aquí generas el tablero automáticamente
    const tableroDiv = document.getElementById('tablero');
    estaciones.forEach(estacion => {
        const div = document.createElement('div');
        div.className = 'casilla ' + estacion.tipo;
        div.id = 'casilla-' + estacion.id;
        div.innerText = estacion.id;
        div.title = estacion.desc; 
        tableroDiv.appendChild(div);
    });

    // 3. Posición inicial
    let posicionActual = 0;
    document.getElementById('casilla-0').classList.add('jugador');

    // 4. Lógica del dado
    function tirarDado(){
        // Quitar al jugador de donde esté
        document.getElementById('casilla-' + posicionActual).classList.remove('jugador');

        // Mover
        const dado = Math.floor(Math.random() * 6) + 1;
        posicionActual = Math.min(posicionActual + dado, 75); // Límite 75

        // Poner al jugador en la nueva posición
        document.getElementById('casilla-' + posicionActual).classList.add('jugador');
        
        document.getElementById('resultado').innerText = "🎲 " + dado;
        document.getElementById('info').innerText = "Posición: " + posicionActual;
    }
</script>
</body>
</html>
