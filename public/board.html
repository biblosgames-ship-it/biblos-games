    }

    const anchoOriginal = 2250;
    const altoOriginal = 2250;
    
    const xPercent = (pos.x / anchoOriginal) * 100;
    const yPercent = (pos.y / altoOriginal) * 100;

    console.log("Calculando porcentaje:", xPercent + "%", yPercent + "%");

    ficha.style.left = xPercent + '%';
    ficha.style.top = yPercent + '%';
    ficha.style.transform = "translate(-50%, -50%)";
