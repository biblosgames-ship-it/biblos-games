<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero Digital Biblos</title>
    <style>
        body { background: #1B1A17; color: #D6D0C4; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        
        #tablero {
            display: grid;
            grid-template-columns: repeat(10, 40px); /* 10 columnas */
            gap: 4px;
            margin: 20px;
        }

        .casilla {
            width: 40px; height: 40px; background: #2A2621; border: 1px solid #3A342C;
            display: flex; align-items: center; justify-content: center; font-size: 10px; color: #555;
        }

        .jugador { background: #D97706 !important; color: black !important; font-weight: bold; box-shadow: 0 0 10px #D97706; }
        
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #D97706; border: none; border-radius: 10px; font-weight: bold; }
        
        .btn-back { position: absolute; top: 20px; left: 20px; color: #D97706; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <a href="/" class="btn-back">← Volver</a>
    <h1>Tablero Digital Biblos</h1>
    
    <div id="tablero"></div>

    <button onclick="tirarDado()">🎲 Tirar dado</button>
    
    <h2 id="resultado">🎲</h2> 
    <h2 id="info">Posición: 0</h2>

    <script>
    const estaciones = [
        { id: 0, desc: "Salida", tipo: "normal" },
        { id: 1, desc: "Creación: Día y Noche", tipo: "normal" },
        { id: 2, desc: "Creación: Cielo y Mar", tipo: "normal" },
        { id: 3, desc: "Creación: Plantas", tipo: "normal" },
        { id: 4, desc: "Creación: Sol y Estrellas", tipo: "pregunta" },
        { id: 5, desc: "Creación: Aves y Peces", tipo: "normal" },
        { id: 6, desc: "Creación: Animales y Hombre", tipo: "normal" },
        { id: 7, desc: "Dios descansó", tipo: "skip" },
        { id: 8, desc: "En el Edén", tipo: "pregunta" },
        { id: 9, desc: "Has pecado", tipo: "retrocede" },
        { id: 10, desc: "Salida del Huerto", tipo: "avanza" },
        { id: 11, desc: "Caín y Abel", tipo: "normal" },
        { id: 12, desc: "El Gran Diluvio", tipo: "pregunta" },
        { id: 13, desc: "Sobreviviste al Diluvio", tipo: "normal" },
        { id: 14, desc: "Torre de Babel", tipo: "pregunta" },
        { id: 15, desc: "Dios llama a Abraham", tipo: "normal" },
        { id: 16, desc: "El hijo de la promesa", tipo: "normal" },
        { id: 17, desc: "Jacob y Esaú", tipo: "pregunta" },
        { id: 75, desc: "META: Cielo nuevo y tierra nueva", tipo: "meta" }
    ];

    const tableroDiv = document.getElementById('tablero');
    
    // Generar casillas
    for(let i=0; i<=75; i++) {
        const div = document.createElement('div');
        div.className = 'casilla';
        div.id = 'casilla-' + i;
        div.innerText = i;
        tableroDiv.appendChild(div);
    }

    let posicionActual = 0;
    document.getElementById('casilla-0').classList.add('jugador');

    function tirarDado() {
        document.getElementById('casilla-' + posicionActual).classList.remove('jugador');

        const dado = Math.floor(Math.random() * 6) + 1;
        posicionActual = Math.min(posicionActual + dado, 75);
        
        // Efectos simples
        if(posicionActual === 9) posicionActual = 0;
        if(posicionActual === 10) posicionActual += 2;

        document.getElementById('casilla-' + posicionActual).classList.add('jugador');
        document.getElementById('resultado').innerText = "🎲 " + dado;
        document.getElementById('info').innerText = "Posición: " + posicionActual;
    }
    </script>
</body>
</html>
