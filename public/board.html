<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tablero Digital Biblos</title>
  <style>
    body {
      background: #1B1A17;
      color: #D6D0C4;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    #game-wrapper {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #tablero-container {
      position: relative;
      width: 100%;
      /* Ajuste dinámico */
      aspect-ratio: 1 / 1;
      /* Mantiene el contenedor cuadrado, como el tablero original */
      margin: 20px auto;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      background: #000;
      /* Para la cámara */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #camera-view {
      position: relative;
      width: 100%;
      height: 100%;
      transform-origin: 50% 50%;
      transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      /* Suave y rebotante */
      will-change: transform;
    }

    #tablero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #jugador-ficha {
      position: absolute;
      width: clamp(15px, 3vw, 30px);
      /* Tamaño responsivo para la ficha */
      height: clamp(15px, 3vw, 30px);
      background: #D97706;
      border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 0 10px rgba(217, 119, 6, 0.8);
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      /* Transición suave y rebotante */
      top: 0;
      left: 0;
      z-index: 10;
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      margin-top: 20px;
      width: 100%;
    }

    button {
      padding: 15px 40px;
      font-size: 20px;
      background: #D97706;
      border: none;
      border-radius: 50px;
      font-weight: 900;
      cursor: pointer;
      color: black;
      box-shadow: 0 5px 15px rgba(217, 119, 6, 0.4);
      transition: transform 0.1s, background 0.3s;
    }

    button:active {
      transform: scale(0.95);
    }

    button:hover {
      background: #F59E0B;
    }

    .info-panel {
      background: rgba(255, 255, 255, 0.05);
      padding: 15px 30px;
      border-radius: 15px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      min-width: 250px;
    }

    .info-panel h2 {
      margin: 0 0 10px 0;
      font-size: 2rem;
    }

    .info-panel h3 {
      margin: 0;
      color: #9CA3AF;
      font-weight: normal;
    }

    /* Estilos del Lobby de Configuración */
    #game-lobby {
      background: rgba(255, 255, 255, 0.05);
      padding: 40px;
      border-radius: 20px;
      text-align: left;
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 100%;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      margin-top: 50px;
    }

    #game-lobby h1 {
      color: #D97706;
      text-align: center;
      margin-top: 0;
      margin-bottom: 30px;
    }

    .lobby-section {
      margin-bottom: 25px;
    }

    .lobby-section h3 {
      margin-bottom: 10px;
      color: #FCD34D;
      font-size: 1.1rem;
    }

    .mode-select label {
      display: block;
      margin-bottom: 10px;
      cursor: pointer;
      font-size: 1.1rem;
    }

    .mode-select input {
      margin-right: 10px;
      transform: scale(1.2);
    }

    select,
    input[type="text"] {
      width: 100%;
      padding: 12px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      border-radius: 8px;
      font-size: 1rem;
    }

    .player-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .color-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1px solid white;
      flex-shrink: 0;
    }

    /* Estilos del Modal (Alerta Especial) */
    #modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 100;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(5px);
    }

    #modal-box {
      background: #27272A;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      border: 2px solid #D97706;
      transform: scale(0.8);
      opacity: 0;
      transition: all 0.3s ease;
    }

    #modal-box.show {
      transform: scale(1);
      opacity: 1;
    }

    #modal-title {
      color: #D97706;
      margin-top: 0;
      font-size: 1.5rem;
    }

    #modal-text {
      color: #fff;
      font-size: 1.1rem;
      line-height: 1.5;
      margin-bottom: 25px;
    }

    #modal-btn {
      background: transparent;
      color: #D97706;
      border: 2px solid #D97706;
      padding: 10px 25px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
      margin-top: 15px;
    }

    #modal-btn:hover {
      background: #D97706;
      color: black;
    }

    /* Estilos de Trivia dentro del Modal */
    #trivia-options {
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
      margin-bottom: 20px;
    }

    .trivia-btn {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      font-size: 1rem;
      transition: all 0.2s;
      font-weight: normal;
      box-shadow: none;
    }

    .trivia-btn:hover {
      background: rgba(217, 119, 6, 0.2);
      border-color: #D97706;
    }

    .trivia-btn.correct {
      background: #10B981 !important;
      color: white !important;
      border-color: #059669 !important;
    }

    .trivia-btn.incorrect {
      background: #EF4444 !important;
      color: white !important;
      border-color: #B91C1C !important;
    }
  </style>
</head>

  <a href="/"

      <h3>Modo de Juego</h3>
      <div class="mode-select">

          Multijugador (Con Dados)
        </label>
        <label>
          <input type="radio" name="gameMode" value="solitaire" onchange="toggleLobbyMode()">
          Solitario (Avanzar Respondiendo)
        </label>
      </div>
    </div>

    <div class="lobby-section" id="multiplayer-config">
      <h3>Cantidad de Jugadores</h3>
      <select id="player-count" onchange="generatePlayerInputs()">
        <option value="1">1 Jugador</option>
        <option value="2" selected>2 Jugadores</option>
        <option value="3">3 Jugadores</option>
        <option value="4">4 Jugadores</option>
        <option value="5">5 Jugadores</option>
        <option value="6">6 Jugadores</option>
        <option value="7">7 Jugadores</option>
        <option value="8">8 Jugadores</option>
      </select>

      <div id="player-inputs">
        <!-- Inputs for names will be generated here -->
      </div>
    </div>

    <button onclick="startGame()" style="margin-top: 20px; width: 100%;">¡COMENZAR JUEGO!</button>
  </div>

  <div id="game-wrapper" style="display: none;">
    <h1 style="color: #F59E0B; text-align: center; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px;">
      Tablero Digital</h1>

    <div id="tablero-container">
      <div id="camera-view">
        <img src="/Tablero.jpg" id="tablero-img" alt="Tablero de Juego">
        <div id="jugador-ficha"></div>
      </div>
    </div>

    <div class="controls">
      <div class="info-panel">
        <h2 id="resultado">🎲 Tiro: -</h2>
        <h3 id="info">Casilla actual: Salida</h3>
      </div>
      <button onclick="moverFicha()" id="btn-tirar">🎲 Tirar Dado</button>
      <button id="btn-solitario" onclick="avanzarSolitario()" style="display: none;">🎯 Avanzar Respondiendo</button>
    </div>
  </div>

  <!-- Modal para acciones especiales -->
  <div id="modal-overlay">
    <div id="modal-box">

      <p id="modal-text">Texto de la acción aquí</p>

      <div id="trivia-options">

      </div>

          </div>

            style="background: rgba(27, 26, 23, 0.5); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: center;">

          </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px;">
          <p
            style="text-align: center; font-size: 0.65rem; color: #78716C; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em; margin: 0;">

            NUEVA PARTIDA
          </button>
        </div>
      </div>
    </div>
  </div>

    // --- LÓGICA DE CÁMARA (NUEVO VISUAL) ---
    function moverCamara(xPercent, yPercent, zoomBase) {
      const camera = document.getElementById('camera-view');
      // Para centrar el X,Y provisto, movemos el contenedor inversamente
      // Si la ficha está en 20x 80y, la centramos moviéndonos a 50-20=30%x, 50-80=-30%y respecto al centro original.
      const translateX = 50 - xPercent;
      const translateY = 50 - yPercent;
      camera.style.transform = `translate(${translateX}%, ${translateY}%) scale(${zoomBase})`;
    }

    // --- FUNCIONES DE TURNO Y UI ---
    function actualizarPanelTurno() {
      const j = jugadores[turnoActual];
      const infoHTML = document.getElementById('info');

      if (modoJuego === 'multiplayer') {
        document.getElementById('resultado').innerHTML = `<span style="color:${j.color}">🎲 Turno de: ${j.nombre}</span>`;
        infoHTML.innerText = `Posición: ${j.posicion}`;
      } else {
        document.getElementById('resultado').innerHTML = `Modo Solitario`;
        infoHTML.innerText = `Casilla Actual: ${j.posicion}`;
      }

      // Animación sugerida de Scrolling hacia la UI para preparar el turno
      const panelInfo = document.getElementById('panel');
      if (panelInfo) {
        panelInfo.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }

      // Cámara resetea suavemente para darle vista de pájaro al jugador y ver el tablero entero
      moverCamara(50, 50, 1);
    }

    // Adaptamos para que reciba cualquier jugador en especifico
    function actualizarFichaEnPantalla(posIndex, jugador) {
      if (!jugador || !jugador.uiElement) return;
      const ficha = jugador.uiElement;
      const pos = coordenadas[posIndex];

      if (!pos) return;

      // Desplazamiento sutil basado en el ID del jugador para que no se superpongan exactamente
      // Ejemplo: Jugador 0 queda en medio, Jugador 1 se mueve un poquito a la derecha abajo, etc.
      const offsets = [
        { x: 0, y: 0 },
        { x: 6, y: -6 },
        { x: -6, y: 6 },
        { x: -9, y: -9 },
        { x: 9, y: 9 },
        { x: 0, y: -9 },
        { x: 0, y: 9 },
        { x: -9, y: 0 }
      ];

      const miOffset = offsets[jugador.id] || { x: 0, y: 0 };

      // Si la coordenada ya es un porcentaje
      const isPercentObj = (pos.x <= 100 && pos.y <= 100);

      let xPercentReal = 0;
      let yPercentReal = 0;

      if (isPercentObj) {
        xPercentReal = pos.x;
        yPercentReal = pos.y;
        ficha.style.left = `calc(${pos.x}% + ${miOffset.x}px)`;
        ficha.style.top = `calc(${pos.y}% + ${miOffset.y}px)`;
      } else {
        const xPercent = (pos.x / 600) * 100;
        const yPercent = (pos.y / 600) * 100;
        xPercentReal = xPercent;
        yPercentReal = yPercent;
        ficha.style.left = `calc(${xPercent}% + ${miOffset.x}px)`;
        ficha.style.top = `calc(${yPercent}% + ${miOffset.y}px)`;
      }

      ficha.style.transform = "translate(-50%, -50%)";

      // Pide cámara a esta posición si es el jugador activo moviéndose
      if (jugador.id === jugadores[turnoActual]?.id) {
        moverCamara(xPercentReal, yPercentReal, 1.8);
      }
    }

    // --- CONTROL DE TURNOS ---
    function siguienteTurno() {
      if (modoJuego === 'solitaire') {
        // Solitario: No pasa el turno, sigue el mismo explorador
        bloqueado = false;
        return;
      }

      // Multijugador: Pasamos al siguiente
      turnoActual++;
      if (turnoActual >= jugadores.length) turnoActual = 0;

      const sgteJugador = jugadores[turnoActual];

      if (sgteJugador.turnosPerdidos > 0) {
        sgteJugador.turnosPerdidos--;
        mostrarModal("Turno Perdido", `${sgteJugador.nombre}, te quedan ${sgteJugador.turnosPerdidos} turnos de castigo.`, () => {
          siguienteTurno(); // Pasa al siguiente automáticamente
        });
      } else {
        actualizarPanelTurno();
        bloqueado = false;
      }
    }

    function evaluarCasilla(posIndex, jugadorActivo = null) {
      if (!jugadorActivo) jugadorActivo = jugadores[turnoActual];
      const info = casillasInfo[posIndex];

      // Casilla normal sin efecto
      if (!info || info.effect === null) {
        siguienteTurno();
        return;
      }

      // Preparar el Modal según el efecto
      let titulo = "¡Evento en el Tablero!";
      let texto = `Has caído en: "${info.description}"\n\n`;
      let accionMovimiento = null; // Función de mov extra si aplica
      let repetirTurno = false; // Bandera para ROLL_AGAIN nativo
      const effect = info.effect;

      // Reseteamos UI del modal de trivia por defecto
      document.getElementById('trivia-options').style.display = 'none';
      document.getElementById('modal-btn').style.display = 'inline-block';

      if (effect === "QUESTION") {
        titulo = `Trivia: ${info.period}`;

        // Buscar preguntas que correspondan al periodo de esta casilla
        const preguntasFiltradas = preguntasTrivia.filter(q => q.period === info.period);

        if (preguntasFiltradas.length > 0) {
          // Escoger una pregunta al azar
          const preguntaAlAzar = preguntasFiltradas[Math.floor(Math.random() * preguntasFiltradas.length)];
          texto += preguntaAlAzar.question;

          // Lógica de Renderizar Opciones (Se encarga de bloquear botón normal)
          prepararModalTrivia(preguntaAlAzar, jugadorActivo);
        } else {
          texto += "¡Pregunta libre! El moderador debe hacer una pregunta sobre este periodo. Si respondes bien, juegas de nuevo.";
          repetirTurno = true; // Hardcoded temporal para falta de DB
        }
      }
      else if (effect === "SKIP_TURN") {
        titulo = "¡Pierdes un turno!";
        texto += "Deberás esperar aquí la próxima vez que te toque jugar.";
        jugadorActivo.turnosPerdidos += 1;
      }
      else if (effect.startsWith("MOVE_")) {
        const casillas = parseInt(effect.replace("MOVE_", ""));
        titulo = "¡Mensaje Especial!";
        texto += `Adelantas ${casillas} casillas tu ficha.`;
        accionMovimiento = () => aplicarMovimientoExtra(jugadorActivo.posicion + casillas, jugadorActivo);
      }
      else if (effect.startsWith("GOTO_")) {
        const destino = parseInt(effect.replace("GOTO_", ""));
        titulo = "¡Situación Imprevista!";
        if (destino === 0) {
          texto += "Vuelves a la casilla de Salida.";
        } else {
          texto += `Te trasladas a la casilla ${destino}.`;
        }
        accionMovimiento = () => aplicarMovimientoExtra(destino, jugadorActivo);
      }
      else if (effect === "ROLL_AGAIN") {
        titulo = "¡Sigue jugando!";
        texto += "¡Tienes derecho a tirar de nuevo el dado ahora mismo!";
        repetirTurno = true;
      }
      else if (effect === "PAY_5") {
        titulo = "¡Requisito Especial!";
        texto += "Se requiere el pago de 5 monedas/puntos (Según reglas locales).";
      }
      else if (effect === "WIN") {
        titulo = "¡VICTORIA!";
        texto += `¡Felicidades ${jugadorActivo.nombre}, has llegado a la META y has ganado el juego!`;
        bloqueado = true; // Bloquea todo para siempre

        // Lanzamos confeti genérico y modal de victoria
        if (typeof confetti !== 'undefined') {
          confetti({ particleCount: 150, spread: 100, origin: { y: 0.5 } });
        }

        setTimeout(() => {
          mostrarResumenFinal(jugadorActivo);

      }

      mostrarModal(titulo, texto, () => {
        if (accionMovimiento) {
          accionMovimiento();
        } else if (repetirTurno) {
          actualizarPanelTurno();
          bloqueado = false; // Le toca otra vez
        } else if (effect !== "WIN") {
          siguienteTurno(); // Pasa al siguiente solo si no ganó
        }
      });
    }

      const casActual = jugadorActivo.posicion;
      let reglas = { bien: 0, mal: 0 };

      if (modoJuego === 'multiplayer') {
        reglas = triviaConsecuencias[casActual] || { bien: 0, mal: 0 }; // Fallback de seguridad
      } else {
        // Solitario: Bien avanza 1 (Ojo la idea del Solitario es avanzar de casilla en casilla)
        reglas = { bien: 1, mal: 0 }; // Mal no hace nada, se queda en la misma para re-intentar otra vez TODO
      }

      // Aumentamos total de preguntas jugadas
      jugadorActivo.stats.total++;

      if (indexOfSelection === correctIndex) {
        // Aumentamos aciertos y reproducimos sonidos felices
        jugadorActivo.stats.correct++;
        reproducirSonido("correct");

        if (typeof confetti !== 'undefined') {
          confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        }

        btnElement.classList.add('correct');

        // Crear mensaje y acción según regla
        let msjExito = "¡Respuesta Correcta!";

        if (modoJuego === 'solitaire') {
          msjExito += `\n¡Avanzas a la Casilla ${casActual + 1}!`;
        } else if (reglas.bien > 0) {
          msjExito += `\n¡${jugadorActivo.nombre} avanza ${reglas.bien} casillas!`;
        } else {
          msjExito += `\n¡Bien hecho!`;
        }

        document.getElementById('modal-title').innerText = msjExito;

        modalCallback = () => {
          if (reglas.bien > 0) {
            aplicarMovimientoExtra(casActual + reglas.bien, jugadorActivo);
          } else {
            moverCamara(50, 50, 1);
            siguienteTurno();
          }
          continuadBtn.innerText = "Continuar"; // Reset texto original
        };

      } else {
        reproducirSonido("wrong");
        btnElement.classList.add('incorrect');
        // Marcar en verde la que era correcta para enseñar al jugador
        if (todosLosBotones[correctIndex]) {
          todosLosBotones[correctIndex].classList.add('correct');
        }

        let msjFallo = "¡Incorrecto!";

        if (modoJuego === 'solitaire') {
          msjFallo += "\nDebes intentarlo en el próximo turno para poder avanzar.";
        } else if (reglas.mal < 0) {
          const casillasARetroceder = Math.abs(reglas.mal);
          msjFallo += `\n${jugadorActivo.nombre} retrocede ${casillasARetroceder} casillas.`;
        }

        document.getElementById('modal-title').innerText = msjFallo;

        modalCallback = () => {
          if (reglas.mal < 0) {
            aplicarMovimientoExtra(casActual + reglas.mal, jugadorActivo);
          } else {
            moverCamara(50, 50, 1);
            siguienteTurno();
          }
          continuadBtn.innerText = "Continuar";
        };
      }
    }

    function aplicarMovimientoExtra(nuevaPos) {
      // Nos aseguramos que no pase de 75 y no baje de 0
      jugadores[turnoActual].posicion = Math.max(0, Math.min(nuevaPos, 75));
      actualizarFichaEnPantalla(jugadores[turnoActual].posicion, jugadores[turnoActual]);
      document.getElementById('info').innerText = "Casilla actual: " + jugadores[turnoActual].posicion;

      // Esperar a que termine la animación de movimiento para evaluar la nueva casilla
      // Esto permite que las consecuencias (ej. caer en una pregunta por retroceder) se activen
      setTimeout(() => {
        evaluarCasilla(jugadores[turnoActual].posicion, jugadores[turnoActual]);
      }, 600);
    }

    // --- FLUIDEZ DEL TABLERO ---
    function moverFicha() {
      const jugadorActivo = jugadores[turnoActual];

      // Si el juego esta bloqueado o este jugador llegó a la meta, no hacer nada
      if (bloqueado || jugadorActivo.posicion >= 75) return;

      bloqueado = true;
      const dado = Math.floor(Math.random() * 6) + 1;

      // Al iniciar el lanzamiento, scrolleamos hacia el tablero para ver bien a la cámara enfocar
      const tableroCont = document.getElementById('tablero-container');
      if (tableroCont) {
        tableroCont.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }

      // Hacemos un leve zoom y paneo predictivo a su ficha actual
      const posActualCoords = coordenadas[jugadorActivo.posicion];
      if (posActualCoords) {
        const isPercentObj = (posActualCoords.x <= 100 && posActualCoords.y <= 100);
        const xPercent = isPercentObj ? posActualCoords.x : (posActualCoords.x / 600) * 100;
        const yPercent = isPercentObj ? posActualCoords.y : (posActualCoords.y / 600) * 100;
        moverCamara(xPercent, yPercent, 1.4);
      }

      // Animación del dado
      const btn = document.getElementById('btn-tirar');
      const resultadoHTML = document.getElementById('resultado');

      btn.innerText = "🎲 ...";
      btn.disabled = true;
      reproducirSonido("select");

      let repeticiones = 0;
      let intervaloDado = setInterval(() => {
        resultadoHTML.innerHTML = `<span style="color:${jugadorActivo.color}">🎲 ${Math.floor(Math.random() * 6) + 1}</span>`;
        repeticiones++;

        if (repeticiones > 10) {
          clearInterval(intervaloDado);
          // Mostrar resultado real
          resultadoHTML.innerHTML = `<span style="color:${jugadorActivo.color}">🎲 ¡Tiraste un ${dado}!</span>`;

          // Calcular nueva posición para el jugador activo
          let nuevaPosicion = Math.min(jugadorActivo.posicion + dado, 75);
          jugadorActivo.posicion = nuevaPosicion;

          // Mover visualmente
          actualizarFichaEnPantalla(jugadorActivo.posicion, jugadorActivo);
          document.getElementById('info').innerText = "Posición: " + jugadorActivo.posicion;

          // Esperar a que termine la animación de movimiento para evaluar la casilla
          setTimeout(() => {
            evaluarCasilla(jugadorActivo.posicion, jugadorActivo);
          }, 600); // 600ms es la duración del CSS transition de la ficha

          btn.innerText = "🎲 Tirar Dado";
          btn.disabled = false;
        }
      }, 50);
    }

    function avanzarSolitario() {
      const jugadorActivo = jugadores[0]; // Solo hay 1 jugador
      if (bloqueado || jugadorActivo.posicion >= 75) return;
      bloqueado = true;

      // El solitario funciona con Trivia continua, en lugar de dado forzamos Evento QUESTION
      const casActualInfo = casillasInfo[jugadorActivo.posicion];

      let periodoActual = casActualInfo.period;

      let titulo = `Trivia de Solitario: ${periodoActual}`;
      let texto = `Responde correctamente para avanzar a la siguiente casilla de este periodo.\n\n`;

      // Ocultar botones extra si habían quedado limpios
      document.getElementById('trivia-options').style.display = 'none';
      document.getElementById('modal-btn').style.display = 'inline-block';

      // Buscar preguntas
      const preguntasFiltradas = preguntasTrivia.filter(q => q.period === periodoActual);

      if (preguntasFiltradas.length > 0) {
        const preguntaAlAzar = preguntasFiltradas[Math.floor(Math.random() * preguntasFiltradas.length)];
        texto += preguntaAlAzar.question;

        mostrarModal(titulo, texto, () => { });
        // Forzar la trivia
        prepararModalTrivia(preguntaAlAzar, jugadorActivo);
      } else {
        texto += "No hay preguntas en en la base de datos para avanzar. Avanzas automáticamente.";
        mostrarModal(titulo, texto, () => {
          // Forzar avance temporal
          aplicarMovimientoExtra(jugadorActivo.posicion + 1, jugadorActivo);
        });
      }
    }

    // Modal Functions
    let modalCallback = null;

    function mostrarModal(titulo, texto, callback) {
      document.getElementById('modal-title').innerText = titulo;
      document.getElementById('modal-text').innerText = texto;

      const overlay = document.getElementById('modal-overlay');
      overlay.style.display = 'flex';

      // Timeout muy corto para que la transición de CSS se aplique tras pasar de display:none a flex
      setTimeout(() => {
        document.getElementById('modal-box').classList.add('show');
      }, 10);

      modalCallback = callback;
    }

    function cerrarModal() {
      document.getElementById('modal-box').classList.remove('show');

      setTimeout(() => {
        document.getElementById('modal-overlay').style.display = 'none';
        if (modalCallback) {
          modalCallback();
          modalCallback = null;
        }
      }, 300); // 300ms debe coincidir con la transición CSS
    }

    // --- CÁLCULO ESTADÍSTICO Y RESUMEN FINAL ---
    let resultDatosParaCompartir = {};

    function mostrarResumenFinal(ganador) {
      endTime = Date.now();
      const durationSeconds = Math.floor((endTime - startTime) / 1000);

      const mins = Math.floor(durationSeconds / 60);
      const secs = durationSeconds % 60;
      const formattedTime = `${mins}m ${secs}s`;

      const total = ganador.stats.total;
      const correct = ganador.stats.correct;
      const accuracy = total === 0 ? 0 : Math.round((correct / total) * 100);

      let medal = { icon: "📖", label: "Sembrador de Conocimiento", color: "#A8A29E" }; // default text-stone-400
      if (accuracy >= 90) medal = { icon: "🏆", label: "Maestro de la Palabra", color: "#FBBF24" }; // text-amber-400
      else if (accuracy >= 70) medal = { icon: "🥈", label: "Erudito Bíblico", color: "#D6D0C4" }; // text-stone-300
      else if (accuracy >= 50) medal = { icon: "🥉", label: "Discípulo en Camino", color: "#F97316" }; // text-orange-500

      // Asignar al DOM
      document.getElementById('summary-medal-icon').innerText = medal.icon;

      const titleEl = document.getElementById('summary-medal-title');
      titleEl.innerText = medal.label;
      titleEl.style.color = medal.color;

      let resText = `¡${ganador.nombre} ha completado el tablero!`;
      if (modoJuego !== 'solitaire') {
        resText = `¡${ganador.nombre} ha ganado la partida!`;
      }
      document.getElementById('summary-winner-text').innerText = resText;

      document.getElementById('summary-score').innerText = `${correct}/${total}`;
      document.getElementById('summary-accuracy').innerText = `${accuracy}%`;
      document.getElementById('summary-time').innerText = formattedTime;

      // Mostrar Modal ocultando el anterior si estaba abierto
      cerrarModal();
      document.getElementById('final-summary-modal').style.display = 'flex';

      // Set datos para compartir globalmente
      resultDatosParaCompartir = {
        nombre: ganador.nombre,
        medal: medal,
        accuracy: accuracy,
        correct: correct,
        total: total,
        time: formattedTime,
        url: "https://biblosgames.com"
      };
    }

    function obtenerTextoCompartir() {
      if (!resultDatosParaCompartir.medal) return "";
      const rc = resultDatosParaCompartir;
      const acc = rc.accuracy;
      const dibujoPuntos = acc >= 80 ? "status: 🟩🟩🟩🟩🟩" : acc >= 50 ? "status: 🟩🟩🟩⬜⬜" : "status: 🟥⬜⬜⬜⬜";

      return `✨ BIBLOS GAMES - TABLERO DIGITAL ✨\n━━━━━━━━━━━━━━\n${rc.medal.icon} Titulo Obtenido: ${rc.medal.label}\n👤 Jugador: ${rc.nombre}\n${dibujoPuntos}\n🎯 Precisión: ${rc.accuracy}%\n✅ Aciertos: ${rc.correct}/${rc.total}\n⏱️ Tiempo: ${rc.time}\n━━━━━━━━━━━━━━\n¡Desafía tu conocimiento aquí! Accede a nuestra app y descubre la manera mas divertida de estudiar la Biblia 👇\n${rc.url}`;
    }

    function compartirWhatsapp() {
      const textoVis = obtenerTextoCompartir();
      window.open(`https://wa.me/?text=${encodeURIComponent(textoVis)}`, '_blank');
    }

    function compartirCopiar() {
      const textoVis = obtenerTextoCompartir();
      navigator.clipboard.writeText(textoVis).then(() => {
        alert("¡Tarjeta de resultados copiada! Pégala en tu Story 🔥");
      }).catch(err => {
        console.error("No se pudo copiar el texto", err);
      });
    }

    // --- MODO DESARROLLADOR: MAPEADOR DE COORDENADAS ---
    // Esta herramienta te permitirá hacer click en cada casilla para guardar la coordenada perfecta.
    let mapeando = false; // Desactivado ya que tenemos las coordenadas
    let nuevasCoordenadas = [];

    document.getElementById('tablero-img').addEventListener('click', function (e) {
      if (!mapeando) return;

      // Obtenemos el tamaño real del contenedor renderizado en la pantalla actual
      const rect = this.getBoundingClientRect();

      // Calculamos la posición exacta del click relativa a la imagen en la pantalla
      const clickX = e.clientX - rect.left;
      const clickY = e.clientY - rect.top;

      // Lo convertimos a un porcentaje de 0 a 100 para guardarlo
      // Esta es la forma más universal y perfecta de que funcione siempre.
      const percentX = +((clickX / rect.width) * 100).toFixed(2);
      const percentY = +((clickY / rect.height) * 100).toFixed(2);

      // Agregamos la coordenada al array nuevo
      nuevasCoordenadas.push({ x: percentX, y: percentY });

      // Pintamos un marcador visual temporal en donde acaban de hacer click para guiarte
      const marcador = document.createElement('div');
      marcador.style.position = 'absolute';
      marcador.style.width = '10px';
      marcador.style.height = '10px';
      marcador.style.background = 'blue';
      marcador.style.borderRadius = '50%';
      marcador.style.left = percentX + '%';
      marcador.style.top = percentY + '%';
      marcador.style.transform = 'translate(-50%, -50%)';
      marcador.style.zIndex = '100';
      document.getElementById('tablero-container').appendChild(marcador);

      // Mostramos el código que deberás copiar al terminar en la consola
      console.clear();
      console.log("--- Llevas " + nuevasCoordenadas.length + " casillas (Incluyendo la Salida como casilla 0) ---");
      console.log("Copia y reemplaza el bloque 'coordenadas' entero con esto cuando termines de pinchar las 76 casillas (0 al 75):");
      console.log(JSON.stringify(nuevasCoordenadas, null, 2));

      // Mover la ficha naranja allí para que lo veas inmediato
      const ficha = document.getElementById('jugador-ficha');
      ficha.style.left = percentX + '%';
      ficha.style.top = percentY + '%';
      document.getElementById('info').innerText = "Casilla mapeada: " + (nuevasCoordenadas.length - 1);
    });

  </script>
