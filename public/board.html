<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tablero Digital Biblos</title>
    <style>
        body { background: #1B1A17; color: #D6D0C4; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        /* Contenedor del tablero (Asegura que la imagen sea el centro) */
        #tablero-container {
            position: relative;
            width: fit-content;
            margin: 20px auto;
            border: 4px solid #3A342C; /* Marco opcional */
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #tablero-img { max-width: 90vw; height: auto; display: block; }
        
        #jugador-ficha {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #D97706;
            border-radius: 50%;
            border: 2px solid white;
            transition: all 0.5s ease;
            top: 0; left: 0; /* Esto cambiará dinámicamente */
            z-index: 10;
        }

        button { padding: 15px 30px; font-size: 18px; background: #D97706; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; color: black; }
    </style>
</head>
<body>

    <a href="/" style="position: absolute; top: 20px; left: 20px; color: #D97706; text-decoration: none;">← Volver</a>
    <h1>Tablero Digital</h1>
    
    <div id="tablero-container">
        <img src="Tablero.jpg" id="tablero-img">
        <div id="jugador-ficha"></div>
    </div>

    <button onclick="moverFicha()">🎲 Tirar dado</button>
    <h2 id="resultado">🎲</h2>

    <script>
        // Mapeo de coordenadas (X, Y) de cada casilla en tu imagen
        // Necesitaremos llenar esto con los clics que hagas en la imagen
        const coordenadas = [
            {x: 50, y: 800}, // Casilla 0
            {x: 100, y: 800}, // Casilla 1
            // ... aquí irán las 76 coordenadas
        ];

        let posicionActual = 0;

        function moverFicha() {
            const dado = Math.floor(Math.random() * 6) + 1;
            posicionActual = Math.min(posicionActual + dado, 75);
            
            const ficha = document.getElementById('jugador-ficha');
            const pos = coordenadas[posicionActual];
            
            ficha.style.left = pos.x + 'px';
            ficha.style.top = pos.y + 'px';
            
            document.getElementById('resultado').innerText = "🎲 " + dado + " (Estás en la " + posicionActual + ")";
        }
    </script>
</body>
</html>
