<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tablero Digital Biblos</title>

<style>

body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial, Helvetica, sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

button{
  padding:15px 25px;
  font-size:18px;
  margin-top:20px;
  cursor:pointer;
}

</style>
</head>

<body>

<h1>Tablero Digital Biblos</h1>

<p>Aquí se ejecutará el modo tablero.</p>

<button onclick="tirarDado()">Tirar dado</button>

<h2 id="resultado">🎲</h2>

<script>

function tirarDado(){
  const numero = Math.floor(Math.random()*6)+1
  document.getElementById("resultado").innerText = "Resultado: " + numero
}

</script>

</body>
</html>
